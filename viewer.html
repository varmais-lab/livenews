<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsLive — Broadcast Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8131A;
    --dark-red: #B50E14;
    --yellow: #FFC300;
    --dark: #0A0C10;
    --dark2: #111418;
    --panel: #161B22;
    --border: #2A3040;
    --white: #F0F4FF;
    --gray: #8892A4;
    --blue: #1A4FBB;
    --live-green: #00D97E;
    --ticker-bg: #1A1E2A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Barlow', sans-serif;
    color: var(--white);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: var(--dark2);
    border-bottom: 2px solid var(--red);
    height: 52px;
    flex-shrink: 0;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .channel-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--white);
    text-shadow: 0 0 20px rgba(232,19,26,0.6);
  }
  .channel-logo span {
    color: var(--red);
  }

  .logo-badge {
    background: var(--red);
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--red);
    padding: 4px 10px;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    animation: pulse-live 2s infinite;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: white;
    border-radius: 50%;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes pulse-live { 0%,100%{box-shadow:0 0 0 0 rgba(232,19,26,0.4)} 50%{box-shadow:0 0 0 8px rgba(232,19,26,0)} }

  .clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 1px;
  }
  .clock span { color: var(--white); }

  /* ─── MAIN CONTENT AREA ─── */
  .content-area {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ─── VIDEO/MAIN FEED ─── */
  .main-feed {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  .main-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Fullscreen image fallback */
  .main-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  /* Story headline overlay at top */
  .story-tag {
    position: absolute;
    top: 16px;
    left: 0;
    background: var(--red);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 6px 20px 6px 16px;
    clip-path: polygon(0 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
    z-index: 10;
    display: none;
  }

  /* Location tag */
  .location-tag {
    position: absolute;
    top: 16px;
    left: 0;
    background: rgba(10,12,16,0.85);
    border-left: 3px solid var(--yellow);
    color: var(--yellow);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 5px 14px;
    z-index: 10;
  }

  /* ─── LOWER THIRD ─── */
  .lower-third {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
  }

  /* Breaking news banner */
  .breaking-banner {
    display: flex;
    align-items: stretch;
    height: 52px;
    background: rgba(10,12,16,0.92);
    border-top: 3px solid var(--red);
  }

  .breaking-label {
    background: var(--red);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    min-width: 140px;
    justify-content: center;
    position: relative;
  }
  .breaking-label::after {
    content: '';
    position: absolute;
    right: -14px;
    top: 0; bottom: 0;
    border-left: 14px solid var(--red);
    border-top: 52px solid transparent;
    border-bottom: 0px solid transparent;
  }

  .headline-text {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 24px 0 28px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--white);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .source-tag {
    background: var(--panel);
    border-left: 1px solid var(--border);
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 16px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  /* Sub-headline / context strip */
  .sub-headline {
    background: rgba(22, 27, 34, 0.95);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    color: var(--gray);
    min-height: 32px;
  }
  .sub-headline strong {
    color: var(--yellow);
    font-weight: 600;
  }

  /* ─── TICKER ─── */
  .ticker-bar {
    height: 34px;
    background: var(--ticker-bg);
    display: flex;
    align-items: center;
    overflow: hidden;
    border-top: 2px solid var(--blue);
    flex-shrink: 0;
  }

  .ticker-label {
    background: var(--blue);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    padding: 0 14px;
    height: 100%;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    padding-right: 22px;
  }

  .ticker-content {
    flex: 1;
    overflow: hidden;
    position: relative;
    height: 100%;
  }

  .ticker-track {
    display: flex;
    align-items: center;
    height: 100%;
    white-space: nowrap;
    animation: ticker-scroll 40s linear infinite;
    gap: 0;
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    padding: 0 10px;
  }

  .ticker-sep {
    color: var(--red);
    font-size: 18px;
    padding: 0 8px;
    opacity: 0.6;
  }

  @keyframes ticker-scroll {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  /* ─── RIGHT SIDEBAR ─── */
  .sidebar {
    width: 260px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    background: var(--dark2);
    border-bottom: 2px solid var(--red);
    padding: 10px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--red);
  }

  .story-cards {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .story-cards::-webkit-scrollbar { width: 4px; }
  .story-cards::-webkit-scrollbar-track { background: transparent; }
  .story-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .story-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }
  .story-card:hover { border-color: var(--red); transform: translateX(2px); }
  .story-card.active { border-color: var(--red); border-left: 3px solid var(--red); }

  .story-card-img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    display: block;
    filter: brightness(0.85);
  }
  .story-card-img-placeholder {
    width: 100%;
    height: 90px;
    background: linear-gradient(135deg, #1A2035 0%, #0D1020 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 28px;
  }

  .story-card-body {
    padding: 8px 10px;
  }
  .story-card-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 4px;
  }
  .story-card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.3;
  }
  .story-card-time {
    font-size: 10px;
    color: var(--gray);
    margin-top: 5px;
  }

  /* Weather/data widget */
  .data-widget {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    background: var(--dark2);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .weather-icon { font-size: 28px; }
  .weather-info { flex: 1; }
  .weather-city {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gray);
    text-transform: uppercase;
  }
  .weather-temp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    line-height: 1;
  }
  .weather-desc {
    font-size: 11px;
    color: var(--gray);
  }

  /* Overlay for "no content" */
  .no-content-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0A0C10 0%, #141828 100%);
    flex-direction: column;
    gap: 12px;
    color: var(--border);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
  }
  .no-content-overlay .icon { font-size: 64px; opacity: 0.3; }

  /* Alert overlay */
  .alert-overlay {
    position: fixed;
    inset: 0;
    background: rgba(232,19,26,0.15);
    border: 4px solid var(--red);
    pointer-events: none;
    z-index: 100;
    animation: alert-flash 0.5s ease-in-out 3;
    display: none;
  }
  @keyframes alert-flash {
    0%,100%{opacity:0} 50%{opacity:1}
  }

  /* Brand logo overlay */
  .brand-overlay {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 15;
    background: rgba(10,12,16,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 5px 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--white);
    backdrop-filter: blur(4px);
  }
  .brand-overlay span { color: var(--red); }

  /* Fullscreen mode */
  body.fullscreen-mode .sidebar { display: none; }
</style>
</head>
<body>

<div class="alert-overlay" id="alertOverlay"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo-area">
    <div class="channel-logo" id="channelName">SUMAN<span>TV</span></div>
    <div class="logo-badge" id="channelTagline">HEALTH</div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="clock">IST <span id="clockTime">--:--:--</span></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content-area">

  <!-- MAIN FEED -->
  <div class="main-feed" id="mainFeed">
    <!-- No content placeholder -->
    <div class="no-content-overlay" id="noContentOverlay">
      <div class="icon">📺</div>
      <div>AWAITING BROADCAST</div>
    </div>

    <!-- Video player -->
    <video class="main-video" id="mainVideo" autoplay muted loop playsinline style="display:none"></video>

    <!-- Image display -->
    <img class="main-image" id="mainImage" src="" alt="">

    <!-- Brand overlay -->
    <div class="brand-overlay" id="brandOverlay" style="display:none">
      <span id="brandName">SUMAN<span style="color:#FFC300">TV</span></span>
    </div>

    <!-- Location tag -->
    <div class="location-tag" id="locationTag" style="display:none"></div>

    <!-- Story tag -->
    <div class="story-tag" id="storyTag" style="display:none"></div>

    <!-- Lower Third -->
    <div class="lower-third">
      <div class="sub-headline" id="subHeadlineBar" style="display:none">
        <strong id="subLabel">DEVELOPING</strong>
        <span id="subText">More details awaited...</span>
      </div>
      <div class="breaking-banner" id="breakingBanner" style="display:none">
        <div class="breaking-label" id="breakingLabel">BREAKING<br>NEWS</div>
        <div class="headline-text" id="headlineText">Headline will appear here</div>
        <div class="source-tag" id="sourceTag">NEWS18</div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">▶ TOP STORIES</div>
    <div class="story-cards" id="storyCards">
      <!-- Populated by JS -->
    </div>
    <div class="data-widget">
      <div class="weather-icon" id="weatherIcon">⛅</div>
      <div class="weather-info">
        <div class="weather-city" id="weatherCity">HYDERABAD</div>
        <div class="weather-temp" id="weatherTemp">34°</div>
        <div class="weather-desc" id="weatherDesc">Partly Cloudy</div>
      </div>
    </div>
  </div>
</div>

<!-- TICKER -->
<div class="ticker-bar">
  <div class="ticker-label">LATEST</div>
  <div class="ticker-content">
    <div class="ticker-track" id="tickerTrack">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script>
// ─── CLOCK ───
function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent =
    now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ─── DEFAULT STATE ───
let state = {
  channelName: 'SUMANTVHEALTH',
  channelTagline: 'HEALTH',
  brandVisible: true,
  brandName: 'SumanTV Health',

  mediaType: 'none', // 'video' | 'image' | 'none'
  mediaUrl: '',

  breakingVisible: false,
  breakingLabel: 'BREAKING\nNEWS',
  headlineText: '',
  sourceTag: 'SUMANTV',

  subHeadlineVisible: false,
  subLabel: 'DEVELOPING',
  subText: '',

  storyTagVisible: false,
  storyTagText: '',

  locationTagVisible: false,
  locationTagText: '',

  tickerItems: [
    'SumanTV Health brings you the latest medical news from India and around the world',
    'Over 100 hospital partners across Andhra Pradesh and Telangana',
    'Watch exclusive interviews with leading doctors and health experts',
    'SumanTV Health — your trusted source for wellness content in Telugu',
    'New episodes every day at 9 AM and 6 PM IST',
  ],

  stories: [],

  weather: { city: 'HYDERABAD', temp: '34°', desc: 'Partly Cloudy', icon: '⛅' },

  alertFlash: false,
  fullscreen: false,
};

// ─── RENDER ───
function render(s) {
  // Channel
  const parts = s.channelName.match(/^(.+?)(TV|NEWS|LIVE|MEDIA)?$/i) || [s.channelName, s.channelName, ''];
  document.getElementById('channelName').innerHTML = (parts[1]||s.channelName).toUpperCase() +
    '<span>' + (parts[2]||'') + '</span>';
  document.getElementById('channelTagline').textContent = s.channelTagline;

  // Brand overlay
  document.getElementById('brandOverlay').style.display = s.brandVisible ? 'block' : 'none';
  document.getElementById('brandName').textContent = s.brandName;

  // Media
  const vid = document.getElementById('mainVideo');
  const img = document.getElementById('mainImage');
  const none = document.getElementById('noContentOverlay');
  if (s.mediaType === 'video' && s.mediaUrl) {
    vid.style.display = 'block'; img.style.display = 'none'; none.style.display = 'none';
    if (vid.src !== s.mediaUrl) { vid.src = s.mediaUrl; vid.load(); vid.play(); }
  } else if (s.mediaType === 'image' && s.mediaUrl) {
    img.style.display = 'block'; vid.style.display = 'none'; none.style.display = 'none';
    if (img.src !== s.mediaUrl) img.src = s.mediaUrl;
  } else {
    none.style.display = 'flex'; vid.style.display = 'none'; img.style.display = 'none';
  }

  // Breaking banner
  document.getElementById('breakingBanner').style.display = s.breakingVisible ? 'flex' : 'none';
  document.getElementById('breakingLabel').innerHTML = s.breakingLabel.replace('\n','<br>');
  document.getElementById('headlineText').textContent = s.headlineText;
  document.getElementById('sourceTag').textContent = s.sourceTag;

  // Sub headline
  document.getElementById('subHeadlineBar').style.display = s.subHeadlineVisible ? 'flex' : 'none';
  document.getElementById('subLabel').textContent = s.subLabel;
  document.getElementById('subText').textContent = s.subText;

  // Story tag
  document.getElementById('storyTag').style.display = s.storyTagVisible ? 'block' : 'none';
  document.getElementById('storyTag').textContent = s.storyTagText;

  // Location tag
  document.getElementById('locationTag').style.display = s.locationTagVisible ? 'block' : 'none';
  document.getElementById('locationTag').textContent = s.locationTagText;

  // Ticker
  renderTicker(s.tickerItems);

  // Stories
  renderStories(s.stories);

  // Weather
  document.getElementById('weatherIcon').textContent = s.weather.icon;
  document.getElementById('weatherCity').textContent = s.weather.city;
  document.getElementById('weatherTemp').textContent = s.weather.temp;
  document.getElementById('weatherDesc').textContent = s.weather.desc;

  // Fullscreen
  document.body.classList.toggle('fullscreen-mode', s.fullscreen);
}

function renderTicker(items) {
  const track = document.getElementById('tickerTrack');
  if (!items || !items.length) return;
  const doubled = [...items, ...items]; // seamless loop
  track.innerHTML = doubled.map(t =>
    `<span class="ticker-item">${t}</span><span class="ticker-sep">◆</span>`
  ).join('');
}

function renderStories(stories) {
  const container = document.getElementById('storyCards');
  if (!stories || !stories.length) {
    container.innerHTML = '<div style="padding:16px;color:var(--gray);font-size:12px;text-align:center;">No stories yet.<br>Add from control panel.</div>';
    return;
  }
  container.innerHTML = stories.map((s, i) => `
    <div class="story-card ${s.active ? 'active' : ''}" onclick="activateStory(${i})">
      ${s.image ? `<img class="story-card-img" src="${s.image}" alt="">` : `<div class="story-card-img-placeholder">📰</div>`}
      <div class="story-card-body">
        <div class="story-card-tag">${s.category || 'NEWS'}</div>
        <div class="story-card-title">${s.title || 'Untitled Story'}</div>
        <div class="story-card-time">${s.time || 'Just now'}</div>
      </div>
    </div>
  `).join('');
}

function activateStory(index) {
  state.stories = state.stories.map((s, i) => ({...s, active: i === index}));
  const story = state.stories[index];
  if (story) {
    if (story.headline) { state.headlineText = story.headline; state.breakingVisible = true; }
    if (story.mediaUrl) { state.mediaUrl = story.mediaUrl; state.mediaType = story.mediaType || 'image'; }
    if (story.subText) { state.subText = story.subText; state.subHeadlineVisible = true; }
    render(state);
  }
}

// ─── STORAGE SYNC ───
function loadFromStorage() {
  try {
    const saved = localStorage.getItem('newsbroadcast_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
  render(state);
}

// Poll for updates from backend every 1s
setInterval(() => {
  try {
    const saved = localStorage.getItem('newsbroadcast_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      render(state);
    }
  } catch(e) {}
}, 1000);

// Alert flash trigger
setInterval(() => {
  try {
    const alert = localStorage.getItem('newsbroadcast_alert');
    if (alert && alert !== window._lastAlert) {
      window._lastAlert = alert;
      const overlay = document.getElementById('alertOverlay');
      overlay.style.display = 'block';
      overlay.style.animation = 'none';
      void overlay.offsetWidth;
      overlay.style.animation = 'alert-flash 0.5s ease-in-out 3';
      setTimeout(() => { overlay.style.display = 'none'; }, 1700);
    }
  } catch(e) {}
}, 500);

loadFromStorage();
</script>
</body>
</html>
